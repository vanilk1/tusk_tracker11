{% extends 'tasks/base.html' %}
{% block title %}Вхід{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card auth-card p-4">
            <div class="text-center mb-3">
                <i class="bi bi-shield-lock text-primary" style="font-size:2.2rem;"></i>
                <h1 class="h4 mt-2 mb-0">Вхід у систему</h1>
                <p class="text-muted small">Раді бачити вас знову</p>
            </div>
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger small">{{ field.errors }}</div>
                        {% endif %}
                    </div>
                {% endfor %}
                <button type="submit" class="btn btn-primary w-100"><i class="bi bi-box-arrow-in-right"></i> Увійти</button>
            </form>
            <p class="mt-3 text-center mb-0">
                Немає акаунту? <a href="{% url 'register' %}">Зареєструватися</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
